<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f8f9fa;}
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
        form { border: 1px solid #ddd; padding: 20px; border-radius: 5px; margin-bottom: 30px; background-color: #fdfdfd;}
        input, select { margin-bottom: 15px; padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
        button { padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;}
        button:hover { background-color: #004494; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px;}
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        .error { color: #dc3545; margin-bottom: 15px; font-weight: bold; background: #f8d7da; padding: 10px; border-radius: 4px; border: 1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Registration Form</h2>

        <div th:if="${param.error != null}">
            <p class="error" th:if="${param.error[0] == 'missing_fields'}">Error: All fields are required!</p>
            <p class="error" th:if="${param.error[0] == 'duplicate_email'}">Error: A student with this email already exists!</p>
        </div>

        <form th:action="@{/api/students}" th:object="${student}" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required />

            <label for="course">Course:</label>
            <select id="course" th:field="*{course}" required>
                <option value="" disabled selected>Select a Course</option>
                <option value="AI & ML">AI & ML</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Robotics">Robotics</option>
                <option value="Electronics">Electronics</option>
            </select>

            <button type="submit">Submit</button>
        </form>

        <hr>

        <h2>Student List Table</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${listStudents}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.course}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
